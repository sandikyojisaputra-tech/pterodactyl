version: '3.8'

networks:
  ptero_internal:
    driver: bridge
    internal: true 
  ptero_public:
    driver: bridge
  wings0:
    name: wings0
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.name: wings0

services:
  # --- Database: MariaDB ---
  database:
    image: mariadb:10.11
    container_name: ptero_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --skip-ssl
    volumes:
      - /srv/pterodactyl/database:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "GANTI_PASSWORD_ROOT"
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: "GANTI_PASSWORD_DATABASE"
      TZ: Asia/Jakarta
    networks:
      - ptero_internal
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=GANTI_PASSWORD_DATABASE"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache & Queue: Redis ---
  redis:
    image: redis:7-alpine
    container_name: ptero_redis
    restart: unless-stopped
    command: redis-server --requirepass "GANTI_PASSWORD_REDIS"
    environment:
      TZ: Asia/Jakarta
    networks:
      - ptero_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "GANTI_PASSWORD_REDIS", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Pterodactyl Panel ---
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: ptero_panel
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/pterodactyl/var:/app/var
      - /srv/pterodactyl/nginx:/etc/nginx/http.d
      - /srv/pterodactyl/certs:/etc/letsencrypt
      - /srv/pterodactyl/logs:/app/storage/logs
    networks:
      - ptero_internal
      - ptero_public
    environment:
      APP_URL: "https://{CODESPACE_NAME}-80.app.github.dev"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_TIMEZONE: Asia/Jakarta
      APP_SERVICE_AUTHOR: "admin@example.com"
      TRUSTED_PROXIES: "*"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: "GANTI_PASSWORD_DATABASE"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "GANTI_PASSWORD_REDIS"
      MAIL_DRIVER: smtp
      MAIL_HOST: "mail.example.com"
      MAIL_PORT: 587

  # --- Queue Worker ---
  worker:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: ptero_worker
    command: php artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /srv/pterodactyl/var:/app/var
      - /srv/pterodactyl/logs:/app/storage/logs
    networks:
      - ptero_internal
    environment:
      APP_URL: "https://your-codespace-url.app.github.dev"
      APP_ENV: production
      APP_TIMEZONE: Asia/Jakarta
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: "GANTI_PASSWORD_DATABASE"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "GANTI_PASSWORD_REDIS"

  # --- Cron Service ---
  cron:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: ptero_cron
    command: sh -c "while [ true ]; do php /app/artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /srv/pterodactyl/var:/app/var
      - /srv/pterodactyl/logs:/app/storage/logs
    networks:
      - ptero_internal
    environment:
      APP_URL: "https://your-codespace-url.app.github.dev"
      APP_ENV: production
      APP_TIMEZONE: Asia/Jakarta
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: "GANTI_PASSWORD_DATABASE"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "GANTI_PASSWORD_REDIS"

  # --- Pterodactyl Wings ---
  wings:
    image: ghcr.io/pterodactyl/wings:latest
    container_name: ptero_wings
    restart: always
    privileged: true 
    ports:
      - "8080:8080"
      - "2022:2022"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /etc/pterodactyl:/etc/pterodactyl
      - /srv/daemon-data:/srv/daemon-data
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /var/log/pterodactyl:/var/log/pterodactyl
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - wings0
      - ptero_public
    environment:
      TZ: Asia/Jakarta
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
